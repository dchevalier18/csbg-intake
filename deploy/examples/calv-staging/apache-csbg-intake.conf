# CSBG Client Intake System — Apache virtual host (staging)
# Additive vhost on a shared box: answers for csbg-intake.caclv.org and the raw
# IP via ServerAlias, and reverse-proxies to the Next.js app on 127.0.0.1:3100
# (systemd: csbg-intake.service). Other sites on this host are unaffected —
# their explicit ServerNames still match first, and 000-default stays the
# catch-all for everything else.
<VirtualHost *:80>
    ServerName csbg-intake.caclv.org
    ServerAlias YOUR_SERVER_IP

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3100/
    ProxyPassReverse / http://127.0.0.1:3100/
    RequestHeader set X-Forwarded-Proto "http"

    ErrorLog ${APACHE_LOG_DIR}/csbg-intake-error.log
    CustomLog ${APACHE_LOG_DIR}/csbg-intake-access.log combined
</VirtualHost>
